openapi: 3.0.3
info:
  title: Golang API REST
  description: Migration of the reference Java Spring Boot REST API for managing Pessoas.
  version: 1.0.0
paths:
  /login:
    post:
      summary: Login user
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Unauthorized
        '400':
          description: Invalid request body

  /pessoa:
    get:
      summary: Retorna uma lista de pessoas
      operationId: GetAll
      security:
        - BearerAuthentication: []
      responses:
        '200':
          description: List of individuals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pessoa'
        '401':
          description: Unauthorized
    post:
      summary: Cadastra uma pessoa
      operationId: Create
      security:
        - BearerAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pessoa'
      responses:
        '200':
          description: Pessoa created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pessoa'
        '400':
          description: Invalid boundary constraints or request body
        '401':
          description: Unauthorized

  /pessoa/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Retorna uma pessoa
      operationId: GetById
      security:
        - BearerAuthentication: []
      responses:
        '200':
          description: Person found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pessoa'
        '404':
          description: Person not found
        '401':
          description: Unauthorized
    put:
      summary: Atualiza uma pessoa
      operationId: Update
      security:
        - BearerAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pessoa'
      responses:
        '200':
          description: Person updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pessoa'
        '400':
          description: Invalid boundary constraints or request body
        '404':
          description: Person not found
        '401':
          description: Unauthorized
    delete:
      summary: Deleta uma pessoa
      operationId: Delete
      security:
        - BearerAuthentication: []
      responses:
        '200':
          description: Person deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Person not found
        '401':
          description: Unauthorized

components:
  securitySchemes:
    BearerAuthentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    Pessoa:
      type: object
      required:
        - nome
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        nome:
          type: string
          minLength: 3
          maxLength: 255
